<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">

  <!-- Card -->
  <div class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl">

    <!-- Logo / Title -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600 mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Welcome back</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-6">
      <div class="flex-1 h-px bg-white/10"></div>
      <span class="text-slate-500 text-xs">or sign in with email</span>
      <div class="flex-1 h-px bg-white/10"></div>
    </div>

    <!-- Email & Password Form -->
    <form class="space-y-4">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Email address</label>
        <input
          type="email"
          placeholder="you@example.com"
          class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
        />
      </div>

      <!-- Password -->
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="block text-sm font-medium text-slate-300">Password</label>
          <a href="#" class="text-xs text-blue-400 hover:text-blue-300 transition-colors">Forgot password?</a>
        </div>
        <input
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
        />
      </div>

      <!-- Remember me -->
      <div class="flex items-center gap-2">
        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-white/20 bg-white/5 text-blue-600 cursor-pointer" />
        <label for="remember" class="text-sm text-slate-400 cursor-pointer">Remember me for 30 days</label>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="w-full py-3 px-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm transition-all duration-200 mt-2 cursor-pointer shadow-lg shadow-blue-600/25"
      >
        Sign in
      </button>

    </form>


        <!-- Social Login Buttons -->
    <div class="space-y-3 mb-6 mt-6">

      <!-- Google -->
      <button (click)="loginWithGoogle()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-white text-slate-700 font-medium text-sm hover:bg-slate-100 transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Microsoft -->
      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-white/10 text-white font-medium text-sm hover:bg-white/15 border border-white/10 transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24">
          <path fill="#F25022" d="M1 1h10v10H1z"/>
          <path fill="#00A4EF" d="M13 1h10v10H13z"/>
          <path fill="#7FBA00" d="M1 13h10v10H1z"/>
          <path fill="#FFB900" d="M13 13h10v10H13z"/>
        </svg>
        Continue with Microsoft
      </button>

      <!-- Facebook -->
      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-[#1877F2] text-white font-medium text-sm hover:bg-[#166FE5] transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 24 24">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Continue with Facebook
      </button>

      <!-- Apple -->
      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-white/10 text-white font-medium text-sm hover:bg-white/15 border border-white/10 transition-all duration-200 cursor-pointer">
        <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 24 24">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
        </svg>
        Continue with Apple
      </button>

    </div>

    <!-- Sign up link -->
    <p class="text-center text-sm text-slate-500 mt-6">
      Don't have an account?
      <a href="#" class="text-blue-400 hover:text-blue-300 font-medium transition-colors ml-1">Sign up for free</a>
    </p>

  </div>
</div>
